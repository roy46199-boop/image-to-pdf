<!DOCTYPE html>
<html>
<head>
  <title>Image to PDF Converter Pro | Free Online Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Convert images to PDF online for free. Fast, secure, and easy PDF converter.">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#020617);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #38bdf8; }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      max-width: 450px;
      margin: auto;
    }

    #drop {
      border: 2px dashed #38bdf8;
      padding: 20px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    img {
      width: 80px;
      margin: 5px;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📄 Image to PDF Converter Pro</h1>
<p>Drag & drop images and convert instantly</p>

<div class="box">

  <div id="drop">📂 Drag & Drop Images Here</div>
  <input type="file" id="upload" multiple style="display:none">

  <div id="preview"></div>

  <button onclick="convertToPDF()">🔥 Convert to PDF</button>

</div>

<script>
let files = [];

const drop = document.getElementById("drop");
const input = document.getElementById("upload");
const preview = document.getElementById("preview");

drop.onclick = () => input.click();

input.onchange = (e) => handleFiles(e.target.files);

drop.ondragover = (e) => {
  e.preventDefault();
  drop.style.background = "#1e293b";
};

drop.ondrop = (e) => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
};

function handleFiles(selectedFiles) {
  files = [...selectedFiles];
  preview.innerHTML = "";

  files.forEach(file => {
    let reader = new FileReader();
    reader.onload = function(e) {
      let img = document.createElement("img");
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

async function convertToPDF() {
  if (files.length === 0) {
    alert("Upload images first");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let i = 0; i < files.length; i++) {
    let reader = new FileReader();

    await new Promise(resolve => {
      reader.onload = function(e) {
        let img = new Image();
        img.src = e.target.result;

        img.onload = function() {
          if (i > 0) pdf.addPage();

          pdf.addImage(img, 'JPEG', 10, 10, 180, 260);
          resolve();
        };
      };
      reader.readAsDataURL(files[i]);
    });
  }

  pdf.save("converted.pdf");
}
</script>

</body>
</html>
